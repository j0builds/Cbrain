services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: cbrain
      POSTGRES_USER: cbrain
      POSTGRES_PASSWORD: cbrain_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cbrain"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
